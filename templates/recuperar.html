<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recuperar contraseña</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<style>

body{
font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
background:#f4f7fb;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:40px;
border-radius:12px;
width:400px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
margin-bottom:20px;
border:1px solid #ccc;
border-radius:6px;
font-size:16px;
}

button{
width:100%;
padding:12px;
border:none;
background:#2f80ed;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1c5ec4;
}

a{
display:block;
text-align:center;
margin-top:15px;
text-decoration:none;
color:#2f80ed;
}

.flash{
background:#ffe0e0;
padding:10px;
border-radius:5px;
margin-bottom:15px;
text-align:center;
}

</style>
</head>

<body>

<div class="container">

<h2>🔐 Recuperar contraseña</h2>

{% with messages = get_flashed_messages() %}
{% if messages %}
    {% for message in messages %}
        <div class="flash">{{message}}</div>
    {% endfor %}
{% endif %}
{% endwith %}

<form method="POST" action="/recuperar-password">

<input type="email" name="email" placeholder="Ingresa tu correo" required>

<button type="submit">Enviar recuperación</button>

</form>

<a href="/">Volver al login</a>

</div>

</body>
</html>
